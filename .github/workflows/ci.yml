name: CI - Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Google Test
        run: sudo apt-get install -y libgtest-dev cmake

      - name: Build Google Test
        run: |
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib

      - name: Compile tests
        run: g++ -std=c++17 -o test_runner test/test_select.cpp -lgtest -lgtest_main -pthread

      - name: Run tests
        run: ./test_runner
